name: Diagnostics Nightly

on:
  schedule:
    # GitHub cron is UTC; this runs daily at 02:00 Warsaw during CEST.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  nightly:
    uses: ./.github/workflows/diagnostics-reusable.yml
    with:
      profile: nightly
      run_kind: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
