name: Hot-Path Profiling Nightly

on:
  schedule:
    # GitHub cron is UTC; this runs weekly at 04:00 Warsaw during CEST.
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      jfr_settings:
        description: "JFR event settings"
        required: true
        default: profile
        type: choice
        options:
          - profile
          - default

permissions:
  contents: read
  actions: read

jobs:
  nightly:
    uses: ./.github/workflows/hot-path-profiling-reusable.yml
    with:
      profile: nightly
      jfr_settings: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.jfr_settings || 'profile' }}
      run_kind: ${{ github.event_name == 'schedule' && 'scheduled' || 'manual' }}
