name: Diagnostics Reusable

on:
  workflow_call:
    inputs:
      profile:
        required: true
        type: string
      run_kind:
        required: true
        type: string
      checkout_ref:
        required: true
        type: string
      require_main:
        required: true
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: diagnostics-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  diagnostics:
    name: Run ${{ inputs.profile }} diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PROFILE: ${{ inputs.profile }}
      RUN_KIND: ${{ inputs.run_kind }}
      CHECKOUT_REF: ${{ inputs.checkout_ref }}
      REQUIRE_MAIN: ${{ inputs.require_main }}
      OUT_DIR: target/nightly-diagnostics
      JAR_PATH: target/scala-3.8.2/amor-fati.jar
    steps:
      - name: Check out diagnostics ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3

      - name: Resolve diagnostics run metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short HEAD)"
          warsaw_time="$(TZ=Europe/Warsaw date '+%Y-%m-%d %H:%M:%S %Z')"
          if [[ "${RUN_KIND}" == "scheduled" ]]; then
            run_id="${PROFILE}-$(date -u +%Y%m%d)-${short_sha}"
          else
            run_id="${PROFILE}-manual-$(date -u +%Y%m%d-%H%M)-${short_sha}"
          fi
          run_root="${OUT_DIR}/${PROFILE}/${run_id}"
          artifact_name="amor-fati-diagnostics-${run_id}"
          case "${PROFILE}" in
            smoke) retention_days=7 ;;
            nightly) retention_days=30 ;;
            extended) retention_days=90 ;;
            *) retention_days=14 ;;
          esac

          {
            echo "sha=${sha}"
            echo "short_sha=${short_sha}"
            echo "run_id=${run_id}"
            echo "run_root=${run_root}"
            echo "artifact_name=${artifact_name}"
            echo "retention_days=${retention_days}"
            echo "warsaw_time=${warsaw_time}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Nightly Diagnostics"
            echo
            echo "- Profile: \`${PROFILE}\`"
            echo "- Commit: \`${sha}\`"
            echo "- Checkout ref: \`${CHECKOUT_REF}\`"
            echo "- Require main: \`${REQUIRE_MAIN}\`"
            echo "- Run id: \`${run_id}\`"
            echo "- Output root: \`${run_root}\`"
            echo "- Artifact: \`${artifact_name}\`"
            echo "- Artifact retention: \`${retention_days} days\`"
            echo "- Warsaw run time: \`${warsaw_time}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Build assembled jar under Nix
        id: build
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${OUT_DIR}"
          start_seconds="$(date +%s)"
          set +e
          nix develop --command sbt assembly 2>&1 | tee "${OUT_DIR}/build.log"
          exit_code="${PIPESTATUS[0]}"
          set -e
          end_seconds="$(date +%s)"

          {
            echo "exit_code=${exit_code}"
            echo "duration_seconds=$((end_seconds - start_seconds))"
          } >> "${GITHUB_OUTPUT}"

          exit 0

      - name: Run diagnostics profile from assembled jar
        if: ${{ steps.build.outputs.exit_code == '0' }}
        id: diagnostics
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${OUT_DIR}"
          export GITHUB_REF_NAME="${CHECKOUT_REF}"
          export GITHUB_SHA="${{ steps.meta.outputs.sha }}"

          runner_args=(
            com.boombustgroup.amorfati.diagnostics.NightlyDiagnosticsProfileRunner
            --profile "${PROFILE}"
            --out "${OUT_DIR}"
            --run-id "${{ steps.meta.outputs.run_id }}"
            --jar-path "${JAR_PATH}"
          )
          if [[ "${REQUIRE_MAIN}" == "true" ]]; then
            runner_args+=(--require-main)
          fi

          start_seconds="$(date +%s)"
          set +e
          nix develop --command java -cp "${JAR_PATH}" "${runner_args[@]}" 2>&1 | tee "${OUT_DIR}/diagnostics.log"
          exit_code="${PIPESTATUS[0]}"
          set -e
          end_seconds="$(date +%s)"

          {
            echo "exit_code=${exit_code}"
            echo "duration_seconds=$((end_seconds - start_seconds))"
          } >> "${GITHUB_OUTPUT}"

          exit 0

      - name: Report diagnostics result
        if: ${{ always() }}
        shell: bash
        env:
          RUN_ID: ${{ steps.meta.outputs.run_id }}
          RUN_ROOT: ${{ steps.meta.outputs.run_root }}
          COMMIT_SHA: ${{ steps.meta.outputs.sha }}
          BUILD_EXIT_CODE: ${{ steps.build.outputs.exit_code }}
          BUILD_DURATION_SECONDS: ${{ steps.build.outputs.duration_seconds }}
          DIAGNOSTICS_EXIT_CODE: ${{ steps.diagnostics.outputs.exit_code }}
          DIAGNOSTICS_DURATION_SECONDS: ${{ steps.diagnostics.outputs.duration_seconds }}
          ARTIFACT_NAME: ${{ steps.meta.outputs.artifact_name }}
          RETENTION_DAYS: ${{ steps.meta.outputs.retention_days }}
          MANIFEST_PATH: ${{ steps.meta.outputs.run_root }}/run-manifest.json
          HEALTH_PATH: ${{ steps.meta.outputs.run_root }}/health-summary.json
          BUILD_LOG_PATH: target/nightly-diagnostics/build.log
          LOG_PATH: target/nightly-diagnostics/diagnostics.log
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          profile = os.environ.get("PROFILE", "unknown")
          run_id = os.environ.get("RUN_ID", "unknown")
          commit = os.environ.get("COMMIT_SHA", "unknown")
          build_exit_code = os.environ.get("BUILD_EXIT_CODE") or "not-run"
          build_duration = os.environ.get("BUILD_DURATION_SECONDS") or "not-recorded"
          diagnostics_exit_code = os.environ.get("DIAGNOSTICS_EXIT_CODE") or "not-run"
          diagnostics_duration = os.environ.get("DIAGNOSTICS_DURATION_SECONDS") or "not-recorded"
          artifact_name = os.environ.get("ARTIFACT_NAME") or "not-created"
          retention_days = os.environ.get("RETENTION_DAYS") or "not-configured"
          manifest_path = Path(os.environ.get("MANIFEST_PATH", ""))
          health_path = Path(os.environ.get("HEALTH_PATH", ""))
          build_log_path = Path(os.environ.get("BUILD_LOG_PATH", ""))
          log_path = Path(os.environ.get("LOG_PATH", ""))

          status = "MISSING_MANIFEST"
          reason = ""
          failed_step = ""
          health_status = "MISSING_HEALTH_SUMMARY"
          failed_health_metrics = []
          if build_exit_code not in ("0", "not-run"):
              status = "BUILD_FAILED"
              if build_log_path.is_file():
                  lines = build_log_path.read_text(errors="replace").splitlines()
                  reason = "\n".join(lines[-40:])
          elif manifest_path.is_file():
              try:
                  data = json.loads(manifest_path.read_text())
                  status = data.get("status", "UNKNOWN")
                  reason = data.get("error") or ""
                  for step in data.get("steps", []):
                      if step.get("status") == "FAILED":
                          failed_step = step.get("id", "")
                          reason = reason or step.get("error") or ""
                          break
              except Exception as exc:
                  status = "MALFORMED_MANIFEST"
                  reason = f"{type(exc).__name__}: {exc}"
          elif log_path.is_file():
              lines = log_path.read_text(errors="replace").splitlines()
              reason = "\n".join(lines[-20:])

          if health_path.is_file():
              try:
                  health = json.loads(health_path.read_text())
                  health_status = health.get("status", "UNKNOWN")
                  failed_health_metrics = [
                      metric.get("id", "")
                      for metric in health.get("metrics", [])
                      if metric.get("status") == "FAIL" and metric.get("hard") is True
                  ]
              except Exception as exc:
                  health_status = f"MALFORMED_HEALTH_SUMMARY:{type(exc).__name__}"

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as out:
              out.write("\n")
              out.write("### Result\n\n")
              out.write(f"- Status: `{status}`\n")
              out.write(f"- Profile: `{profile}`\n")
              out.write(f"- Commit: `{commit}`\n")
              out.write(f"- Run id: `{run_id}`\n")
              out.write(f"- Build exit code: `{build_exit_code}`\n")
              out.write(f"- Build runtime seconds: `{build_duration}`\n")
              out.write(f"- Diagnostics exit code: `{diagnostics_exit_code}`\n")
              out.write(f"- Diagnostics runtime seconds: `{diagnostics_duration}`\n")
              out.write(f"- Manifest: `{manifest_path}`\n")
              out.write(f"- Health summary: `{health_status}` (`{health_path}`)\n")
              out.write(f"- Artifact: `{artifact_name}`\n")
              out.write(f"- Artifact retention days: `{retention_days}`\n")
              if failed_step:
                  out.write(f"- Failed step: `{failed_step}`\n")
              if failed_health_metrics:
                  out.write(f"- Failed health metrics: `{', '.join(failed_health_metrics[:8])}`\n")
              if reason:
                  out.write("\n#### Failure Reason\n\n")
                  out.write("```text\n")
                  out.write(reason[-4000:])
                  out.write("\n```\n")
          PY

          if [[ "${BUILD_EXIT_CODE:-}" =~ ^[0-9]+$ ]] && [[ "${BUILD_EXIT_CODE}" != "0" ]]; then
            exit "${BUILD_EXIT_CODE}"
          fi
          if [[ "${DIAGNOSTICS_EXIT_CODE:-}" =~ ^[0-9]+$ ]] && [[ "${DIAGNOSTICS_EXIT_CODE}" != "0" ]]; then
            exit "${DIAGNOSTICS_EXIT_CODE}"
          fi

      - name: Download performance baseline artifact
        if: ${{ always() && inputs.profile != 'extended' }}
        id: performance_baseline
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_PREFIX: amor-fati-diagnostics-${{ inputs.profile }}-
          BASELINE_DIR: target/performance-baseline/diagnostics-${{ inputs.profile }}
        run: |
          set -euo pipefail

          selection_json="${BASELINE_DIR}/selection.json"
          python3 scripts/select-performance-baseline.py \
            --repo "${GITHUB_REPOSITORY}" \
            --artifact-prefix "${ARTIFACT_PREFIX}" \
            --out-json "${selection_json}" \
            --github-output "${GITHUB_OUTPUT}"

          artifact_name="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("artifact_name", ""))' "${selection_json}")"
          run_id="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("run_id", ""))' "${selection_json}")"
          if [[ -n "${artifact_name}" && -n "${run_id}" ]]; then
            artifact_dir="${BASELINE_DIR}/artifact"
            rm -rf "${artifact_dir}"
            mkdir -p "${artifact_dir}"
            timeout 120s gh run download "${run_id}" --name "${artifact_name}" --dir "${artifact_dir}" || true
            manifest="$(find "${artifact_dir}" -name run-manifest.json -print -quit)"
            echo "manifest=${manifest}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Write performance regression report
        if: ${{ always() }}
        shell: bash
        env:
          RUN_ROOT: ${{ steps.meta.outputs.run_root }}
          CURRENT_MANIFEST: ${{ steps.meta.outputs.run_root }}/run-manifest.json
          BASELINE_MANIFEST: ${{ steps.performance_baseline.outputs.manifest }}
          BASELINE_ARTIFACT: ${{ steps.performance_baseline.outputs.artifact_name }}
          SKIP_REASON: ${{ inputs.profile == 'extended' && 'extended profile remains report-only for performance budgets until #718 resolves all-failed bank stress semantics.' || '' }}
        run: |
          set -euo pipefail

          report_dir="${RUN_ROOT}/performance"
          mkdir -p "${report_dir}"
          args=(
            --current "${CURRENT_MANIFEST}"
            --out-json "${report_dir}/performance-regression-report.json"
            --out-md "${report_dir}/performance-regression-report.md"
            --profile "${PROFILE}"
            --source "diagnostics"
            --baseline-artifact "${BASELINE_ARTIFACT:-}"
          )
          if [[ -n "${BASELINE_MANIFEST:-}" ]]; then
            args+=(--baseline "${BASELINE_MANIFEST}")
          fi
          if [[ -n "${SKIP_REASON:-}" ]]; then
            args+=(--skip-reason "${SKIP_REASON}")
          fi

          python3 scripts/performance-regression-report.py "${args[@]}"
          {
            echo
            cat "${report_dir}/performance-regression-report.md"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload diagnostics artifacts
        if: ${{ always() && steps.meta.outputs.artifact_name != '' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            ${{ steps.meta.outputs.run_root }}/
            target/nightly-diagnostics/build.log
            target/nightly-diagnostics/diagnostics.log
          if-no-files-found: warn
          retention-days: ${{ steps.meta.outputs.retention_days }}
          compression-level: 6
