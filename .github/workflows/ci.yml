name: CI

on:
  push:
  pull_request:

jobs:
  generated-outputs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          submodules: recursive

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3

      - name: Check documentation hygiene
        run: nix develop --command python3 scripts/check-docs.py

      - name: Check generated repository outputs
        run: nix develop --command bash scripts/check-generated-outputs.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@v31.10.6

      - name: Check Nix flake
        run: nix flake check --print-build-logs

      - name: Validate Nix development shell
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            java -version 2>&1 | head -1 | grep -E "^openjdk version \"21\\."
            python3 --version
            z3 --version
          '

      - name: Check formatting
        run: nix develop --command sbt scalafmtCheckAll

      - name: Run non-heavy unit tests with coverage
        run: nix develop --command sbt coverage "tsv / Test / test" "model / Test / test" "monteCarlo / Test / test" "cli / Test / test" coverageAggregate

      - name: Run heavy unit tests without coverage
        run: nix develop --command sbt -DamorFati.includeHeavyTests=true "root / Test / testOnly * -- -n com.boombustgroup.amorfati.tags.Heavy"

      - name: Run integration tests
        run: nix develop --command sbt "integrationTests / Test / test"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/scala-3.8.2/scoverage-report/scoverage.xml
          fail_ci_if_error: false
